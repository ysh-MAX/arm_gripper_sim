controller_manager:
  ros__parameters:
    update_rate: 500
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController
      

arm_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: false
    allow_partial_joints_goal: false
    gains:
      joint1: {p: 30.0, d: 10.0, i: 0.3, i_clamp: 2.0}   
      joint2: {p: 50.0, d: 20.0, i: 1.5, i_clamp: 6.0}   
      joint3: {p: 45.0, d: 18.0, i: 1.2, i_clamp: 5.0}   
      joint4: {p: 20.0, d: 10.0, i: 0.1, i_clamp: 1.0}   
      joint5: {p: 20.0, d: 10.0, i: 0.1, i_clamp: 1.0}
      joint6: {p: 10.0, d: 8.0,  i: 0.01, i_clamp: 1.0}

gripper_controller:
  ros__parameters:
    joint: robotiq_85_left_knuckle_joint
